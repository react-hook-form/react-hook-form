name: Benchmark

on:
  pull_request:
    branches: [master]

jobs:
  bench:
    name: Performance regression check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # Full history needed so we can checkout master for comparison.
          fetch-depth: 0

      - name: Install Dependencies
        uses: ./.github/actions/install-dependencies

      - name: Compare against master
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: pnpm bench:compare master "$HEAD_REF" --ci
